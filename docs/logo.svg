<svg width="1400" height="340" viewBox="0 0 1400 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Clinical Signal ML logo</title>
  <desc id="desc">A healthcare-inspired logo with a full-width pulse waveform and clean wordmark.</desc>
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E7F3EE"/>
      <stop offset="100%" stop-color="#DCEBFF"/>
    </linearGradient>
    <linearGradient id="waveGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0C7A5C"/>
      <stop offset="50%" stop-color="#2267B8"/>
      <stop offset="100%" stop-color="#0C7A5C"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Full-width background -->
  <rect x="0" y="0" width="1400" height="340" rx="36" fill="url(#bgGradient)"/>

  <!-- Decorative full-width background waveform -->
  <path d="M0 240 H100 L170 185 L260 280 L400 95 L490 205 H600
           L670 170 L750 255 L860 110 L940 215 H1060
           L1130 175 L1210 265 L1320 100 L1400 210"
        fill="none"
        stroke="url(#waveGradient)"
        stroke-width="5"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.15"/>

  <!-- Centered title -->
  <text x="700" y="148"
        font-family="Segoe UI, SF Pro Display, Helvetica Neue, Arial, sans-serif"
        font-size="82"
        font-weight="700"
        letter-spacing="0.8"
        fill="#142534"
        text-anchor="middle"
        filter="url(#softShadow)">Clinical Signal ML</text>

  <!-- Tagline -->
  <text x="700" y="200"
        font-family="Segoe UI, SF Pro Text, Helvetica Neue, Arial, sans-serif"
        font-size="30"
        font-weight="500"
        letter-spacing="0.4"
        fill="#36566F"
        text-anchor="middle">Healthcare Time-Series · Edge Intelligence · Rust Core</text>

  <!-- Centered pulse icon with accent dots -->
  <g transform="translate(510 235)">
    <path d="M0 30 H60 L82 4 L116 58 L158 -14 L186 30 H380"
          fill="none"
          stroke="url(#waveGradient)"
          stroke-width="8"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    <circle cx="82" cy="4" r="6" fill="#0C7A5C"/>
    <circle cx="158" cy="-14" r="6" fill="#2267B8"/>
  </g>
</svg>
